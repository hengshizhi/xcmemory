# ── 用户设置 ──
[user]
# 你的名字，会作为与 LLM 对话时的身份标识
name = "绯绯"

# ── 星辰记忆数据库 ──
[memory]
# HTTP API 地址
base_url = "http://127.0.0.1:8080"
# API Key（从星辰记忆服务器获取）
api_key = "xi-admin-i60v1a2Ytrqa4GWh6JSvwg7WZOjzxJ0lBGZFDHoY-LI"
# 记忆系统名称已移至角色卡 YAML 的 system_name 字段

# ── LLM（OpenAI 兼容）──
[llm]
# OpenAI / DeepSeek / OpenRouter 等
base_url = "https://api.deepseek.com"
api_key = "sk-12b183cdc66147a2abd8bab082239b1c"
model = "deepseek-v4-flash"
# 对话最大 token
max_tokens = 2048
temperature = 0.8

# ── 自白设置 ──
[monologue]
# 触发回忆的关键词列表
recall_triggers = ["回忆一下", "回忆", "记得", "记忆中", "之前"]
# 触发记忆写入的关键词列表
remember_triggers = ["记住", "记住这个", "铭记", "记下来", "要记得"]
# 自白最大段数（防止无限循环）
max_segments = 20
# 记忆召回的 top_k
recall_top_k = 5
# 对话前预检索 top_k
prefetch_top_k = 3

# ── 角色卡 ──
[character]
# 默认角色卡路径（相对于 characters/ 目录）
default = "example"
